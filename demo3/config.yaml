# ACGAN + Multi-Head Self-Attention + PPO Configuration File

seed: 42
device: auto

# GPU Configuration
gpu:
  enabled: true
  device_id: 0
  benchmark: true
  deterministic: false
  memory_efficient: false

# Data Configuration
data:
  dataset: CIFAR10
  root: ./data
  image_size: 32
  batch_size: 64
  num_workers: 4

# Model Configuration
model:
  latent_dim: 100
  ngf: 64
  ndf: 64
  num_classes: 10
  spectral_norm: true
  attn_heads:
    g: [8, 4]  # Number of attention heads in generator
    d: [8]     # Number of attention heads in discriminator

# Pretraining Configuration
pretrain:
  lr_g: 2e-4
  lr_d: 2e-4
  betas: [0.5, 0.999]
  epochs: 200
  d_steps: 3
  gp_lambda: 10.0
  class_lambda: 0.1
  loss_type: wgan-gp  # wgan-gp or bce

# PPO Fine-tuning Configuration
ppo:
  enabled: true
  actor_lr: 1e-4
  critic_lr: 3e-4
  gamma: 0.99
  lambda_gae: 0.95
  clip: 0.2
  ent_coef: 0.01
  n_steps: 1024
  update_epochs: 4
  batch_size: 32
  sigma: 0.1
  n_updates: 200

# Reward Function Weights
rewards:
  w_adv: 1.0
  w_class: 0.1
  w_ssim: 0.5
  w_entropy: 0.01

# Evaluation Metrics Configuration
metrics:
  eval_num_images: 5000
  fid_batch_size: 50
  inception_batch_size: 50
  enable_advanced_metrics: true
  eval_batches: 10
  full_metrics_interval: 5
  
  # KL Divergence Configuration
  kl_divergence:
    eps: 1e-8
    
  # KID Configuration
  kid:
    kernel: poly
    degree: 3
    num_subsets: 10
    subset_size: 1000
    
  # LPIPS Configuration
  lpips:
    net_type: vgg
    batch_size: 32
    scales: [1.0, 0.5, 0.25]

# Logging and Saving Configuration
logging:
  eval_interval: 1
  save_interval: 10
  save_dir: ./outputs
  log_dir: ./logs
  tensorboard: true